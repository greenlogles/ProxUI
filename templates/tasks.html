{% extends "base.html" %}

{% block title %}Tasks - Proxmox Manager{% endblock %}

{% block content %}
<div x-data="tasksPage()">
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center">
            <h1><i class="bi bi-list-task"></i> Recent Tasks</h1>
            <button class="btn btn-outline-primary" @click="refresh()" :disabled="loading" title="Refresh Tasks">
                <i class="bi bi-arrow-clockwise" :class="loading && 'spin'"></i> Refresh
            </button>
        </div>
        <p class="text-muted">All recent tasks from the cluster</p>
    </div>
</div>

<div class="row mt-3">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Cluster Tasks</h5>
                <div class="d-flex gap-2">
                    <select class="form-select form-select-sm" style="width: auto;"
                            x-model="filter" @change="applyFilter()">
                        <option value="all">All Tasks</option>
                        <option value="running">Running</option>
                        <option value="ok">Completed</option>
                        <option value="error">Failed</option>
                    </select>
                    <select class="form-select form-select-sm" style="width: auto;"
                            x-model.number="limit" @change="load()">
                        <option value="50">Last 50</option>
                        <option value="100">Last 100</option>
                        <option value="200">Last 200</option>
                    </select>
                </div>
            </div>
            <div class="card-body p-0">
                <template x-if="loading && filteredTasks.length === 0">
                    <div class="text-center p-4">
                        <div class="spinner-border spinner-border-sm" role="status"></div>
                        Loading tasks...
                    </div>
                </template>
                <template x-if="error">
                    <div class="text-danger p-4">
                        <i class="bi bi-exclamation-triangle"></i> Error loading tasks
                    </div>
                </template>
                <template x-if="!loading && !error && filteredTasks.length === 0">
                    <div class="text-muted p-4">
                        <i class="bi bi-info-circle"></i>
                        <span x-text="filter === 'all' ? 'No tasks found' : 'No tasks match the current filter'"></span>
                    </div>
                </template>
                <div x-show="filteredTasks.length > 0" class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Task</th>
                                <th>Node</th>
                                <th>Description</th>
                                <th>User</th>
                                <th>Status</th>
                                <th>Started</th>
                                <th>Duration</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="task in filteredTasks" :key="task.upid || (task.node + task.type + task.starttime)">
                                <tr>
                                    <td>
                                        <strong x-text="taskName(task)"></strong>
                                    </td>
                                    <td>
                                        <span class="badge bg-secondary" x-text="task.node || 'Unknown'"></span>
                                    </td>
                                    <td>
                                        <template x-if="task.id && (task.type || '').startsWith('qm')">
                                            <span>VM <a :href="vmLink(task)" class="text-decoration-none" x-text="task.id"></a></span>
                                        </template>
                                        <template x-if="task.id && (task.type || '').startsWith('vz')">
                                            <span>CT <a :href="vmLink(task)" class="text-decoration-none" x-text="task.id"></a></span>
                                        </template>
                                        <template x-if="!task.id || (!(task.type || '').startsWith('qm') && !(task.type || '').startsWith('vz'))">
                                            <span x-text="task.id || ''"></span>
                                        </template>
                                    </td>
                                    <td x-text="task.user || ''"></td>
                                    <td>
                                        <span class="badge" :class="'bg-' + taskStatusClass(task)"
                                              x-text="task.status || (task.endtime ? 'unknown' : 'running')"></span>
                                    </td>
                                    <td>
                                        <small class="text-muted" x-text="task.start_time_formatted || 'Unknown'"></small>
                                    </td>
                                    <td>
                                        <small class="text-muted" x-text="taskDuration(task)"></small>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</div>{# end x-data="tasksPage" #}
{% endblock %}

{% block scripts %}
<script type="module">
  import * as ProxUtils from "{{ url_for('static', filename='js/utils.js') }}";

  const ALLOWED_STATUS = new Set(['primary', 'secondary', 'success', 'danger', 'warning', 'info', 'dark']);

  function tasksPage() {
    return {
      allTasks: [], filteredTasks: [], _poller: null,
      filter: 'all',
      limit: 50,
      loading: true,
      error: '',

      taskName(task) {
        return ProxUtils.taskTypeName(task.type);
      },

      taskStatusClass(task) {
        return ALLOWED_STATUS.has(task.status_class) ? task.status_class : 'secondary';
      },

      vmLink(task) {
        return `/vm/${encodeURIComponent(task.node)}/${encodeURIComponent(task.id)}`;
      },

      taskDuration(task) {
        if (!task.starttime) return '';
        if (task.endtime) {
          const secs = task.endtime - task.starttime;
          if (secs < 60) return `${secs}s`;
          if (secs < 3600) return `${Math.floor(secs / 60)}m ${secs % 60}s`;
          return `${Math.floor(secs / 3600)}h ${Math.floor((secs % 3600) / 60)}m`;
        }
        const status = (task.status || '').toLowerCase();
        if (status.includes('running') || !task.endtime) {
          const secs = Math.floor(Date.now() / 1000) - task.starttime;
          if (secs < 60) return `${secs}s`;
          if (secs < 3600) return `${Math.floor(secs / 60)}m`;
          return `${Math.floor(secs / 3600)}h ${Math.floor((secs % 3600) / 60)}m`;
        }
        return '';
      },

      applyFilter() {
        if (this.filter === 'all') {
          this.filteredTasks = this.allTasks;
          return;
        }
        this.filteredTasks = this.allTasks.filter(task => {
          const s = (task.status || '').toLowerCase();
          if (this.filter === 'running') return s.includes('running') || !task.endtime;
          if (this.filter === 'ok') return s.includes('ok') || s === 'stopped';
          if (this.filter === 'error') return s.includes('error') || s.includes('failed');
          return true;
        });
      },

      async load() {
        this.loading = true;
        this.error = '';
        try {
          const data = await ProxUtils.apiJson(`/api/tasks?limit=${this.limit}`);
          this.allTasks = Array.isArray(data) ? data : [];
          this.applyFilter();
        } catch (e) {
          this.error = e.message;
        } finally {
          this.loading = false;
        }
      },

      refresh() { this.load(); },

      init() {
        this.load();
        this._poller = ProxUtils.createAdaptivePoller(() => this.load(), 30000);
      },

      destroy() { this._poller?.destroy(); },
    };
  }

  function register() {
    window.Alpine.data('tasksPage', tasksPage);
  }
  if (window.Alpine) register();
  else document.addEventListener('alpine:init', register);
</script>
{% endblock %}
